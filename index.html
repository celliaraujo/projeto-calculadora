<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Calculadora</title>
</head>
<body>
    
    <div class="container">
        <div><input type="text" id="visor" readonly></div>
                
        <div class="botoes">
            <div id="operacoes">
                <button id="bt-somar">+</button>
                <button id="bt-subtrair">-</button>
                <button id="bt-multiplicar">x</button>
                <button id="bt-dividir">/</button>                
            </div>
            <div id="numeros">
                <button id="bt-decimal">.</button> 
                <button id="bt0">0</button>
                <button id="bt1">1</button>
                <button id="bt2">2</button>
                <button id="bt3">3</button>
                <button id="bt4">4</button>
                <button id="bt5">5</button>
                <button id="bt6">6</button>
                <button id="bt7">7</button>
                <button id="bt8">8</button>
                <button id="bt9">9</button>
                               
            </div>
            <div class="">
                <button id="bt-igual">=</button>
                <button id="bt-cancelar">Clear</button>
            </div>
            
        </div>
        
    </div>
    
</body>
</html>
